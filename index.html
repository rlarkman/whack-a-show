<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Whack-a-Mole</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #333;
      background-image: url('images/background.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
      user-select: none; /* Prevents highlighting text while clicking fast */
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
      font-size: 1.5rem;
    }

    button {
      padding: 10px 20px;
      font-size: 1.2rem;
      background-color: #f1c40f;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #f39c12;
    }

    button:disabled {
      background-color: #bdc3c7;
      cursor: not-allowed;
    }

    /* Game Board Grid */
    .game {
      width: 600px;
      height: 600px;
      display: flex;
      flex-wrap: wrap;
      margin: 0 auto;
      cursor: crosshair; /* Adds to the "aiming" feel */
    }

    .hole {
      flex: 1 0 33.33%;
      overflow: hidden;
      position: relative;
      border-radius: 50%;
      background-color: transparent;
      border: 1px solid #333;
      box-sizing: border-box;
      
      /* Depth effect for the hole */
      box-shadow: inset 0 5px 10px rgba(0,0,0,0.5); 
    }

    .hole:after {
      display: block;
      background: rgba(255, 255, 255, 0.1); /* Slight rim light */
      width: 100%;
      height: 10px;
      content: '';
      position: absolute;
      z-index: 2;
      bottom: -30px;
    }

    /* The Mole (Face) */
    .mole {
      /* background-color: #3498db; Default placeholder color */
      background-color: #222; /* Default placeholder color */
      
      /* PLACEHOLDER: This creates a simple face using CSS. 
         Replace this background-image with your team photos later! 
         Example: background-image: url('team-member.png'); */
      background-image: url('https://api.iconify.design/noto:person.svg'); 
      background-size: 80%;
      background-repeat: no-repeat;
      background-position: center bottom;
      
      position: absolute;
      top: 100%; /* Hidden by default (below the hole) */
      width: 100%;
      height: 100%;
      transition: all 0.4s;
      border-radius: 40%;
    }

    /* Class added via JS to pop the mole up */
    .hole.up .mole {
      top: 0;
    }

    /* Whack Effect Animation */
    .whack-effect {
      position: absolute;
      pointer-events: none; /* Let clicks pass through */
      color: red;
      font-weight: 900;
      font-size: 2rem;
      text-shadow: 2px 2px 0 #fff;
      animation: pop 0.5s ease-out forwards;
      z-index: 10;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    
    @media (max-width: 650px) {
        .game { width: 100%; height: auto; }
        .hole { height: 150px; }
    }

    /* Leaderboard Styles */
    .leaderboard {
      margin-top: 30px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .leaderboard h2 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #f1c40f;
    }
    
    .leaderboard ol {
      list-style: none;
      padding: 0;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 20px;
    }
    
    .leaderboard li {
      font-size: 1.5rem;
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .leaderboard li:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>

  <h1>Whack-a-Show-Team-Member!</h1>
  
  <div class="controls">
    <span>Score: <span id="score">0</span></span>
    <span>Time: <span id="time-left">30</span>s</span>
    <button onClick="startGame()" id="start-btn">Start Game</button>
  </div>

  <div class="game">
    <div class="hole" id="hole1"><div class="mole"></div></div>
    <div class="hole" id="hole2"><div class="mole"></div></div>
    <div class="hole" id="hole3"><div class="mole"></div></div>
    <div class="hole" id="hole4"><div class="mole"></div></div>
    <div class="hole" id="hole5"><div class="mole"></div></div>
    <div class="hole" id="hole6"><div class="mole"></div></div>
    <div class="hole" id="hole7"><div class="mole"></div></div>
    <div class="hole" id="hole8"><div class="mole"></div></div>
    <div class="hole" id="hole9"><div class="mole"></div></div>
  </div>

  <div class="leaderboard">
    <h2>High Scores</h2>
    <ol id="high-scores-list"></ol>
  </div>

<script>
  const holes = document.querySelectorAll('.hole');
  const scoreBoard = document.querySelector('#score');
  const timeBoard = document.querySelector('#time-left');
  const startBtn = document.querySelector('#start-btn');
  const gameContainer = document.querySelector('.game');
  const highScoresList = document.querySelector('#high-scores-list');

  let lastHole;
  let timeUp = false;
  let score = 0;
  let timeLeft = 30;
  let countdown;

  // Team mole image pool
  const teamImages = [
    'images/team/br.png',
    'images/team/cp.png',
    'images/team/jp.png',
    'images/team/jz.png',
    'images/team/rj.png',
    'images/team/rl.png',
    'images/team/sa.png',
    'images/team/se.png',
    'images/team/sf.png',
    'images/team/sh.png',
    'images/team/td.png'
  ];

  function randomTeamImage() {
    const idx = Math.floor(Math.random() * teamImages.length);
    return teamImages[idx] || 'https://api.iconify.design/noto:person.svg';
  }

  // Utility: Get a random amount of time for the mole to stay up
  function randomTime(min, max) {
    return Math.round(Math.random() * (max - min) + min);
  }

  // Utility: Pick a random hole
  function randomHole(holes) {
    const idx = Math.floor(Math.random() * holes.length);
    const hole = holes[idx];
    if (hole === lastHole) {
      return randomHole(holes);
    }
    lastHole = hole;
    return hole;
  }

  // The main game loop: Make moles pop up
  function peep() {
    const time = randomTime(400, 1000); // Speed: 0.4s to 1s
    const hole = randomHole(holes);

    // Choose a random team image for this pop-up
    const mole = hole.querySelector('.mole');
    if (mole) {
      mole.style.backgroundImage = `url('${randomTeamImage()}')`;
      mole.style.backgroundSize = 'cover';
      mole.style.backgroundPosition = 'center';
    }
    
    // Add the class that triggers CSS transition to move mole up
    hole.classList.add('up');
    
    setTimeout(() => {
      hole.classList.remove('up');
      if (!timeUp) peep();
    }, time);
  }

  function startGame() {
    scoreBoard.textContent = 0;
    timeBoard.textContent = 30;
    score = 0;
    timeLeft = 30;
    timeUp = false;
    startBtn.disabled = true;
    startBtn.textContent = "Playing...";
    
    // Start the game logic
    peep();
    
    // Start countdown timer
    countdown = setInterval(() => {
      timeLeft--;
      timeBoard.textContent = timeLeft;
      
      if (timeLeft <= 0) {
        clearInterval(countdown);
        timeUp = true;
        startBtn.disabled = false;
        startBtn.textContent = "Start Game";
        
        if (score >= 100) {
            alert(`Game Over! You win! Score: ${score}`);
        } else {
            alert(`Game Over! Final Score: ${score}`);
        }
        checkHighScore(score);
      }
    }, 1000);
  }

  // Visual Effect Helper
  function showWhackAnimation(x, y, text) {
      const effect = document.createElement('div');
      effect.classList.add('whack-effect');
      effect.style.left = `${x}px`;
      effect.style.top = `${y}px`;
      effect.textContent = text;
      document.body.appendChild(effect);
      
      // Cleanup DOM after animation
      setTimeout(() => effect.remove(), 500);
  }

  // Event Listener for Clicks
  // We use Event Delegation on the game board to handle clicks
  gameContainer.addEventListener('click', (e) => {
      if(!e.isTrusted) return; // Cheater detection
      if(startBtn.disabled === false) return; // Game not running

      // Get click coordinates for animation
      const x = e.pageX;
      const y = e.pageY;

      // Check if user clicked a mole
      if (e.target.classList.contains('mole')) {
          // Success!
          const hole = e.target.parentElement;
          
          // Prevent double scoring on same popup
          if(!hole.classList.contains('up')) return; 
          
          score += 10;
          hole.classList.remove('up'); // Mole goes down immediately
          showWhackAnimation(x, y, "WHACK! +10");
      } 
      // Check if user clicked a hole (but missed the mole)
      else if (e.target.classList.contains('hole')) {
          // Miss!
          score -= 10;
          showWhackAnimation(x, y, "MISS! -10");
      }

      scoreBoard.textContent = score;
  });

  // --- Leaderboard Logic ---
  const MAX_HIGH_SCORES = 5;
  const LOCAL_STORAGE_KEY = 'whackAMoleHighScores';

  function checkHighScore(score) {
    const highScores = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || [];
    const lowestScore = highScores[MAX_HIGH_SCORES - 1]?.score ?? 0;

    if (score > lowestScore || highScores.length < MAX_HIGH_SCORES) {
      const name = prompt('You got a high score! Enter your name:');
      if(name) {
        const newScore = { score, name };
        highScores.push(newScore);
        highScores.sort((a, b) => b.score - a.score);
        highScores.splice(MAX_HIGH_SCORES);
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(highScores));
        updateLeaderboard();
      }
    }
  }

  function updateLeaderboard() {
    const highScores = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY)) || [];
    highScoresList.innerHTML = highScores
      .map(score => `<li>${score.name} <span>${score.score}</span></li>`)
      .join('');
  }

  // Initialize leaderboard on load
  updateLeaderboard();

</script>
</body>
</html>
